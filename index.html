<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Fazenda: O Jogo de Agricultura</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e3f2fd;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2e7d32;
        }
        .painel {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .moedas {
            font-size: 24px;
            font-weight: bold;
            color: #f57c00;
        }
        .fazenda {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .canteiro {
            background: #8d6e63;
            border: 4px solid #5d4037;
            border-radius: 15px;
            width: 150px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }
        .status-planta {
            font-size: 14px;
            color: white;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .visual-planta {
            font-size: 50px;
            transition: transform 0.2s;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #bdbdbd;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>🚜 Minha Fazendinha HTML 🌾</h1>
    
    <div class="painel">
        <div class="moedas">💰 Moedas: <span id="contador-moedas">10</span></div>
        <p>Plante, espere crescer, colha e venda para ganhar mais moedas!</p>
    </div>

    <div class="fazenda">
        <div class="canteiro" id="canteiro-1">
            <span class="status-planta" id="status-1">Terra Vazia</span>
            <div class="visual-planta" id="visual-1">🟫</div>
            <button id="btn-1" onclick="acaoCanteiro(1)">Plantar Tomate (Custa 5)</button>
        </div>

        <div class="canteiro" id="canteiro-2">
            <span class="status-planta" id="status-2">Terra Vazia</span>
            <div class="visual-planta" id="visual-2">🟫</div>
            <button id="btn-2" onclick="acaoCanteiro(2)">Plantar Cenoura (Custa 10)</button>
        </div>

        <div class="canteiro" id="canteiro-3">
            <span class="status-planta" id="status-3">Terra Vazia</span>
            <div class="visual-planta" id="visual-3">🟫</div>
            <button id="btn-3" onclick="acaoCanteiro(3)">Plantar Milho (Custa 20)</button>
        </div>
    </div>

    <script>
        // Configurações das plantas (Custo, Tempo para crescer em segundos, Valor de venda, emojis)
        const plantasInfo = {
            1: { nome: "Tomate", custo: 5, tempo: 3, venda: 12, emojiSemente: "🌱", emojiPronto: "🍅" },
            2: { nome: "Cenoura", custo: 10, tempo: 6, venda: 25, emojiSemente: "🌱", emojiPronto: "🥕" },
            3: { nome: "Milho", custo: 20, tempo: 10, venda: 50, emojiSemente: "🌱", emojiPronto: "🌽" }
        };

        // Estado do jogo
        let moedas = 10;
        let canteiros = {
            1: { estado: "vazio" }, // vazio, crescendo, pronto
            2: { estado: "vazio" },
            3: { estado: "vazio" }
        };

        function atualizarInterface() {
            document.getElementById("contador-moedas").innerText = moedas;
            
            for (let id in canteiros) {
                let info = plantasInfo[id];
                let btn = document.getElementById(`btn-${id}`);
                
                if (canteiros[id].estado === "vazio") {
                    btn.innerText = `Plantar ${info.nome} (-${info.custo}💰)`;
                    // Desabilita se o jogador não tiver moedas suficientes
                    btn.disabled = moedas < info.custo;
                } else if (canteiros[id].estado === "crescendo") {
                    btn.innerText = "Crescendo...";
                    btn.disabled = true;
                } else if (canteiros[id].estado === "pronto") {
                    btn.innerText = `Colher e Vender (+${info.venda}💰)`;
                    btn.disabled = false;
                }
            }
        }

        function acaoCanteiro(id) {
            let canteiro = canteiros[id];
            let info = plantasInfo[id];

            if (canteiro.estado === "vazio" && moedas >= info.custo) {
                // Comprar e plantar
                moedas -= info.custo;
                canteiro.estado = "crescendo";
                
                document.getElementById(`status-${id}`).innerText = "Crescendo...";
                document.getElementById(`visual-${id}`).innerText = info.emojiSemente;
                atualizarInterface();

                // Simula o tempo de crescimento
                setTimeout(() => {
                    canteiro.estado = "pronto";
                    document.getElementById(`status-${id}`).innerText = "Pronto!";
                    document.getElementById(`visual-${id}`).innerText = info.emojiPronto;
                    atualizarInterface();
                }, info.tempo * 1000);

            } else if (canteiro.estado === "pronto") {
                // Colher e ganhar moedas
                moedas += info.venda;
                canteiro.estado = "vazio";
                
                document.getElementById(`status-${id}`).innerText = "Terra Vazia";
                document.getElementById(`visual-${id}`).innerText = "🟫";
                atualizarInterface();
            }
        }

        // Inicializa a interface na primeira execução
        atualizarInterface();
    </script>
</body>
</html>
