<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Fazenda Agro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e3f2fd;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        #painel {
            background-color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .moedas { color: #f57c00; }
        .estoque { color: #1565c0; }

        #controles {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-plantar { background-color: #4caf50; color: white; }
        .btn-plantar:hover { background-color: #388e3c; }
        .btn-regar { background-color: #2196f3; color: white; }
        .btn-regar:hover { background-color: #1976d2; }
        .btn-colher { background-color: #ff9800; color: white; }
        .btn-colher:hover { background-color: #f57c00; }
        .btn-vender { background-color: #9c27b0; color: white; }
        .btn-vender:hover { background-color: #7b1fa2; }

        #fazenda {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 15px;
            background-color: #8d6e63;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .lote {
            width: 120px;
            height: 120px;
            background-color: #6d4c41;
            border: 3px solid #5d4037;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 14px;
            text-align: center;
            user-select: none;
            transition: transform 0.1s;
        }

        .lote:active {
            transform: scale(0.95);
        }

        .lote.selecionado {
            border-color: #fff;
            box-shadow: 0 0 10px #fff;
        }

        .emoji {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .status-texto {
            font-size: 12px;
            background-color: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>🚜 Agro Clicker: A Fazendinha</h1>

    <div id="painel">
        <span class="moedas">💰 Moedas: $<span id="txt-moedas">10</span></span>
        <span class="estoque">🌾 Estoque: <span id="txt-estoque">0</span></span>
    </div>

    <div id="controles">
        <button class="btn btn-plantar" onclick="setAcao('plantar')">🌱 Plantar (-$2)</button>
        <button class="btn btn-regar" onclick="setAcao('regar')">💧 Regar</button>
        <button class="btn btn-colher" onclick="setAcao('colher')">🧺 Colher</button>
        <button class="btn btn-vender" onclick="venderTudo()">💰 Vender Tudo (+$5 cada)</button>
    </div>

    <p id="instrucao">Selecione uma ação acima e clique em um lote de terra!</p>

    <div id="fazenda">
        </div>

    <script>
        // Estado do Jogo
        let moedas = 10;
        let estoque = 0;
        let acaoAtual = 'plantar'; // ação padrão inicial

        // Configuração dos lotes (0 = vazio, 1 = plantado, 2 = regado/crescendo, 3 = pronto)
        const lotesDados = Array(9).fill(null).map(() => ({ estado: 0, tempo: 0 }));

        // Inicializar a fazenda na tela
        const fazendaDiv = document.getElementById('fazenda');
        
        function criarFazenda() {
            fazendaDiv.innerHTML = '';
            lotesDados.forEach((lote, index) => {
                const loteDiv = document.createElement('div');
                loteDiv.className = 'lote';
                loteDiv.onclick = () => clicarLote(index);
                fazendaDiv.appendChild(loteDiv);
                atualizarLoteNaTela(index);
            });
        }

        // Define qual ferramenta o jogador está usando
        function setAcao(acao) {
            acaoAtual = acao;
            const instrucoes = {
                'plantar': 'Clique na terra para plantar sementes de trigo (-$2).',
                'regar': 'Clique nas sementes para regá-las.',
                'colher': 'Clique nas plantas maduras para colher.'
            };
            document.getElementById('instrucao').innerText = instrucoes[acao] || '';
        }

        // Lógica do clique em cada lote de terra
        function clicarLote(index) {
            const lote = lotesDados[index];

            if (acaoAtual === 'plantar' && lote.estado === 0) {
                if (moedas >= 2) {
                    moedas -= 2;
                    lote.estado = 1; // Plantado
                    atualizarPainel();
                    atualizarLoteNaTela(index);
                } else {
                    alert('Moedas insuficientes para comprar sementes!');
                }
            } 
            else if (acaoAtual === 'regar' && lote.estado === 1) {
                lote.estado = 2; // Regado / Crescendo
                atualizarLoteNaTela(index);
                
                // Simula o crescimento (3 segundos para crescer)
                setTimeout(() => {
                    if (lote.estado === 2) {
                        lote.estado = 3; // Pronto para colheita
                        atualizarLoteNaTela(index);
                    }
                }, 3000);
            } 
            else if (acaoAtual === 'colher' && lote.estado === 3) {
                lote.estado = 0; // Volta a ficar vazio
                estoque += 1;
                atualizarPainel();
                atualizarLoteNaTela(index);
            }
        }

        // Atualiza o visual do lote baseado no estado atual
        function atualizarLoteNaTela(index) {
            const loteDiv = fazendaDiv.children[index];
            const lote = lotesDados[index];

            if (lote.estado === 0) {
                loteDiv.innerHTML = '<span class="emoji">🟫</span><span class="status-texto">Vazio</span>';
                loteDiv.style.backgroundColor = '#6d4c41';
            } else if (lote.estado === 1) {
                loteDiv.innerHTML = '<span class="emoji">🌱</span><span class="status-texto">Seco</span>';
                loteDiv.style.backgroundColor = '#a1887f';
            } else if (lote.estado === 2) {
                loteDiv.innerHTML = '<span class="emoji">🌿</span><span class="status-texto">Crescendo...</span>';
                loteDiv.style.backgroundColor = '#5d4037';
            } else if (lote.estado === 3) {
                loteDiv.innerHTML = '<span class="emoji">🌾</span><span class="status-texto">Pronto!</span>';
                loteDiv.style.backgroundColor = '#4caf50';
            }
        }

        // Vender o estoque acumulado
        function venderTudo() {
            if (estoque > 0) {
                moedas += estoque * 5;
                estoque = 0;
                atualizarPainel();
            } else {
                alert('Você não tem colheitas no estoque para vender!');
            }
        }

        // Atualiza os textos de moedas e estoque
        function atualizarPainel() {
            document.getElementById('txt-moedas').innerText = moedas;
            document.getElementById('txt-estoque').innerText = estoque;
        }

        // Iniciar o jogo
        criarFazenda();
        setAcao('plantar');
    </script>
</body>
</html>
