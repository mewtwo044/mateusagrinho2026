<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda do Futuro - Colheita Feliz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="painel-principal">
        <h1>🚜 Fazenda do Futuro 🌾</h1>
        
        <div class="painel">
            <div class="celeiro">
                <div class="visual-celeiro">🏚️</div>
                <div class="inventario">
                    <div class="moedas">💰 <span id="contador-moedas">10</span></div>
                    <div class="armadura">🌾 <span id="contador-trigo">0</span></div>
                    <div class="armadura">🍅 <span id="contador-tomate">0</span></div>
                </div>
            </div>
            <p>Plante, colha e venda no celeiro!</p>
        </div>

        <div class="fazenda">
            <div class="canteiro" id="canteiro-1">
                <span class="status-planta" id="status-1">Terra</span>
                <div class="fazendeiro-visual" id="fazendeiro-1">👨‍🌾</div>
                <div class="visual-planta" id="visual-1">🟫</div>
                <button id="btn-1" onclick="acaoCanteiro(1)">Plantar Trigo (Custa 5)</button>
            </div>

            <div class="canteiro" id="canteiro-2">
                <span class="status-planta" id="status-2">Terra</span>
                <div class="fazendeiro-visual" id="fazendeiro-2">👨‍🌾</div>
                <div class="visual-planta" id="visual-2">🟫</div>
                <button id="btn-2" onclick="acaoCanteiro(2)">Plantar Tomate (Custa 10)</button>
            </div>

            <div class="arvores">
                <div class="arvore">🌳</div>
                <div class="arvore">🌲</div>
                <div class="arvore">🌳</div>
                <div class="arvore">🌲</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
